<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Island Escape - Sinh Tồn</title>
    <style>
        body { margin: 0; background: #2d5a27; overflow: hidden; touch-action: none; font-family: Arial; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #ui * { pointer-events: auto; }
        
        /* Chỉ số góc phải trên */
        .stats { position: absolute; top: 10px; right: 10px; }
        .bar { width: 150px; height: 15px; background: #333; border: 2px solid #fff; border-radius: 8px; margin-bottom: 5px; overflow: hidden; }
        #hp { width: 100%; height: 100%; background: #ff4d4d; }
        #food { width: 100%; height: 100%; background: #ffa500; }

        /* Joystick & Nút hành động (Ảnh 2) */
        #joy { position: absolute; bottom: 30px; left: 30px; width: 100px; height: 100px; background: rgba(255,255,255,0.2); border-radius: 50%; border: 2px solid #fff; }
        #stick { position: absolute; top: 25px; left: 25px; width: 50px; height: 50px; background: #bbb; border-radius: 50%; }
        .action { position: absolute; bottom: 30px; right: 30px; width: 80px; height: 80px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        /* Hotbar 8 ô + Dấu 3 chấm (Ảnh 2) */
        .hotbar { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; background: rgba(255,255,255,0.8); padding: 5px; border-radius: 5px; }
        .slot { width: 40px; height: 40px; border: 1px solid #333; background: #fff; }
        .dots { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; color: #000; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="stats">
            <div class="bar"><div id="hp"></div></div>
            <div class="bar"><div id="food"></div></div>
        </div>
        <div id="joy"><div id="stick"></div></div>
        <div class="hotbar">
            <div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div>
            <div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div>
            <div class="dots">...</div>
        </div>
        <div class="action"><img src="https://cdn-icons-png.flaticon.com/512/1004/1004696.png" width="50"></div>
    </div>
    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let p = { x: canvas.width/2, y: canvas.height/2, vx: 0, vy: 0 };
        const joy = document.getElementById('joy'), st = document.getElementById('stick');

        // Logic Joystick mượt
        joy.addEventListener('touchmove', e => {
            e.preventDefault();
            let t = e.touches[0], r = joy.getBoundingClientRect();
            let dx = t.clientX - (r.left + 50), dy = t.clientY - (r.top + 50);
            let d = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
            let ang = Math.atan2(dy, dx);
            p.vx = Math.cos(ang) * (d/50) * 4;
            p.vy = Math.sin(ang) * (d/50) * 4;
            st.style.transform = `translate(${Math.cos(ang)*d}px, ${Math.sin(ang)*d}px)`;
        });

        joy.addEventListener('touchend', () => { p.vx = 0; p.vy = 0; st.style.transform = ''; });

        function draw() {
            ctx.fillStyle = '#2d5a27'; ctx.fillRect(0,0,canvas.width,canvas.height);
            // Vẽ Lửa trại (Campfire)
            ctx.fillStyle = '#e67e22'; ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, 25, 0, 7); ctx.fill();
            // Vẽ Nhân vật (Vàng như ảnh 2)
            p.x += p.vx; p.y += p.vy;
            ctx.fillStyle = '#f1c40f'; ctx.beginPath(); ctx.arc(p.x, p.y, 20, 0, 7); ctx.fill();
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
