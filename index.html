<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Survival Island - Day/Night Cycle</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1a472a; touch-action: none; font-family: Arial; user-select: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #ui * { pointer-events: auto; }
        
        /* Stats & Day/Night */
        .header { position: absolute; top: 15px; left: 15px; color: white; text-shadow: 2px 2px #000; }
        #time-label { font-size: 18px; font-weight: bold; }
        .stats { position: absolute; top: 15px; right: 15px; }
        .bar { width: 140px; height: 14px; background: rgba(0,0,0,0.5); border: 2px solid #fff; border-radius: 7px; margin-bottom: 5px; overflow: hidden; }
        #hp-bar { width: 100%; height: 100%; background: #ff4d4d; }
        #food-bar { width: 100%; height: 100%; background: #ffa500; }

        /* Joystick */
        #joy-bg { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.2); border-radius: 50%; border: 2px solid #fff; }
        #joy-stick { position: absolute; top: 25px; left: 25px; width: 50px; height: 50px; background: #fff; border-radius: 50%; }

        /* Hotbar */
        .hotbar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; background: rgba(255,255,255,0.3); padding: 5px; border-radius: 5px; border: 1px solid #fff; }
        .slot { width: 40px; height: 40px; background: #fff; border: 1px solid #000; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; }
        .slot.active { outline: 3px solid #f1c40f; }

        /* Nút Hành Động */
        #action-btn { position: absolute; bottom: 40px; right: 40px; width: 85px; height: 85px; background: rgba(255,255,255,0.2); border: 4px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 12px; text-align: center; cursor: pointer; }
    </style>
</head>
<body>

<div id="ui">
    <div class="header">
        <div id="day-label">NGÀY 1</div>
        <div id="time-label">SÁNG - 02:00</div>
    </div>
    <div class="stats">
        <div class="bar"><div id="hp-bar"></div></div>
        <div class="bar"><div id="food-bar"></div></div>
    </div>
    <div id="joy-bg"><div id="joy-stick"></div></div>
    <div class="hotbar" id="hotbar"></div>
    <div id="action-btn" onclick="handleAction()">HÀNH ĐỘNG</div>
</div>

<canvas id="game"></canvas>

<script>
    const cvs = document.getElementById('game'), ctx = cvs.getContext('2d');
    cvs.width = window.innerWidth; cvs.height = window.innerHeight;

    // --- Biến Game ---
    let world = { wood: [] };
    let player = { x: 0, y: 0, angle: 0, speed: 4, inventory: Array(8).fill(null), activeSlot: 0 };
    let campfire = { x: 0, y: 0, level: 1, woodNeeded: 3, woodInside: 0, radius: 150 };
    let joy = { x: 0, y: 0, active: false };
    let cycle = { phase: 'Ngày', timeLeft: 120, day: 1 }; // 120s = 2p

    // Khởi tạo củi ngẫu nhiên
    for(let i=0; i<20; i++) spawnWood();

    function spawnWood() {
        world.wood.push({ x: (Math.random()-0.5)*2000, y: (Math.random()-0.5)*2000 });
    }

    // --- Chu kỳ Ngày Đêm ---
    setInterval(() => {
        cycle.timeLeft--;
        if(cycle.timeLeft <= 0) {
            cycle.phase = cycle.phase === 'Ngày' ? 'Đêm' : 'Ngày';
            cycle.timeLeft = 120;
            if(cycle.phase === 'Ngày') cycle.day++;
        }
        document.getElementById('day-label').innerText = `NGÀY ${cycle.day}`;
        let m = Math.floor(cycle.timeLeft/60), s = cycle.timeLeft%60;
        document.getElementById('time-label').innerText = `${cycle.phase.toUpperCase()} - ${m}:${s<10?'0':''}${s}`;
    }, 1000);

    // --- Điều khiển (Joy/Mouse/Touch) ---
    const jBg = document.getElementById('joy-bg'), jSt = document.getElementById('joy-stick');
    function input(clientX, clientY) {
        if(!joy.active) return;
        let r = jBg.getBoundingClientRect(), cx = r.left+50, cy = r.top+50;
        let dx = clientX-cx, dy = clientY-cy, d = Math.min(Math.sqrt(dx*dx+dy*dy), 50), ang = Math.atan2(dy, dx);
        jSt.style.transform = `translate(${Math.cos(ang)*d}px, ${Math.sin(ang)*d}px)`;
        joy.x = Math.cos(ang)*(d/50); joy.y = Math.sin(ang)*(d/50); player.angle = ang;
    }
    jBg.addEventListener('mousedown', () => joy.active = true);
    jBg.addEventListener('touchstart', e => { joy.active = true; input(e.touches[0].clientX, e.touches[0].clientY); });
    window.addEventListener('mousemove', e => input(e.clientX, e.clientY));
    window.addEventListener('touchmove', e => { if(joy.active) input(e.touches[0].clientX, e.touches[0].clientY); });
    window.addEventListener('mouseup', () => { joy.active=false; jSt.style.transform=''; joy.x=0; joy.y=0; });
    window.addEventListener('touchend', () => { joy.active=false; jSt.style.transform=''; joy.x=0; joy.y=0; });

    // --- Xử lý Hành Động ---
    function handleAction() {
        // 1. Nhặt Củi
        let woodIndex = world.wood.findIndex(w => Math.hypot(w.x - player.x, w.y - player.y) < 50);
        if(woodIndex !== -1) {
            for(let i=0; i<8; i++) {
                if(!player.inventory[i]) {
                    player.inventory[i] = { type: 'WOOD', count: 1 };
                    world.wood.splice(woodIndex, 1);
                    renderHotbar(); return;
                }
            }
        }
        // 2. Tiếp Củi cho Lửa
        let distToFire = Math.hypot(campfire.x - player.x, campfire.y - player.y);
        let currentItem = player.inventory[player.activeSlot];
        if(distToFire < 70 && currentItem && currentItem.type === 'WOOD') {
            campfire.woodInside++;
            player.inventory[player.activeSlot] = null;
            if(campfire.woodInside >= campfire.woodNeeded) {
                campfire.level++;
                campfire.woodInside = 0;
                campfire.radius += 50; // Tăng độ sáng
                campfire.woodNeeded += 2;
                alert("Lửa trại đã lên Cấp " + campfire.level);
            }
            renderHotbar();
        }
    }

    // --- Vẽ Game ---
    function loop() {
        player.x += joy.x * player.speed; player.y += joy.y * player.speed;
        let camX = player.x - cvs.width/2, camY = player.y - cvs.height/2;

        // Vẽ Cỏ
        ctx.fillStyle = "#2d5a27"; ctx.fillRect(0,0,cvs.width,cvs.height);

        // Vẽ Củi rơi trên đất
        ctx.fillStyle = "#5d4037";
        world.wood.forEach(w => {
            ctx.fillRect(w.x - camX, w.y - camY, 20, 8);
        });

        // Vẽ Lửa Trại
        let fx = campfire.x - camX, fy = campfire.y - camY;
        ctx.fillStyle = "orange"; ctx.beginPath(); ctx.arc(fx, fy, 25, 0, 7); ctx.fill();
        
        // Vẽ Hiệu ứng Tối (Ban đêm)
        if(cycle.phase === 'Đêm' || cycle.timeLeft < 10) {
            let opacity = cycle.phase === 'Đêm' ? 0.7 : 0.3;
            ctx.fillStyle = `rgba(0,0,0,${opacity})`;
            ctx.fillRect(0,0,cvs.width,cvs.height);
            
            // Đục lỗ ánh sáng (Lửa & Người)
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath(); ctx.arc(fx, fy, campfire.radius, 0, 7); ctx.fill(); // Ánh sáng lửa
            ctx.beginPath(); ctx.arc(cvs.width/2, cvs.height/2, 60, 0, 7); ctx.fill(); // Ánh sáng quanh người
            ctx.globalCompositeOperation = 'source-over';
        }

        // Vẽ Nhân vật (Xoay tay theo Duy yêu cầu)
        ctx.save();
        ctx.translate(cvs.width/2, cvs.height/2);
        ctx.rotate(player.angle);
        ctx.fillStyle = "#f1c40f"; ctx.beginPath(); ctx.arc(0,0,20,0,7); ctx.fill(); // Thân
        ctx.fillStyle = "#f1c40f"; 
        ctx.beginPath(); ctx.arc(18,-12,8,0,7); ctx.fill(); // Tay trái
        ctx.beginPath(); ctx.arc(18,12,8,0,7); ctx.fill();  // Tay phải
        ctx.restore();

        requestAnimationFrame(loop);
    }

    function renderHotbar() {
        let html = '';
        player.inventory.forEach((item, i) => {
            html += `<div class="slot ${player.activeSlot==i?'active':''}" onclick="player.activeSlot=${i}; renderHotbar()">
                ${item ? 'CỦI' : ''}
            </div>`;
        });
        document.getElementById('hotbar').innerHTML = html + '<div class="dots">...</div>';
    }

    renderHotbar(); loop();
</script>
</body>
</html>
