<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Island Survival - Pro Version</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1a472a; touch-action: none; font-family: 'Arial', sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #ui * { pointer-events: auto; }

        /* Chỉ số - Góc phải trên */
        .stats { position: absolute; top: 20px; right: 20px; display: flex; flex-direction: column; gap: 8px; }
        .bar { width: 160px; height: 16px; background: rgba(0,0,0,0.5); border: 2px solid #fff; border-radius: 10px; overflow: hidden; position: relative; }
        #hp-bar { width: 100%; height: 100%; background: #ff4d4d; transition: 0.3s; }
        #food-bar { width: 80%; height: 100%; background: #ffa500; transition: 0.3s; }
        .bar-icon { position: absolute; left: 5px; top: -2px; font-size: 12px; color: white; font-weight: bold; z-index: 2; }

        /* Day Label - Góc trái trên */
        #day-tag { position: absolute; top: 20px; left: 20px; color: #000; font-size: 24px; font-weight: bold; text-shadow: 1px 1px white; }

        /* Joystick - Góc trái dưới */
        #joy-bg { position: absolute; bottom: 50px; left: 50px; width: 110px; height: 110px; background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.5); border-radius: 50%; }
        #joy-stick { position: absolute; top: 30px; left: 30px; width: 50px; height: 50px; background: rgba(255,255,255,0.8); border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* Hotbar 8 ô - Giống ảnh Duy gửi */
        .hotbar { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; background: rgba(255,255,255,0.3); padding: 6px; border-radius: 4px; border: 1px solid #fff; }
        .slot { width: 42px; height: 42px; background: #fff; border: 1px solid #000; display: flex; align-items: center; justify-content: center; position: relative; }
        .slot.active { outline: 3px solid #f1c40f; z-index: 5; }
        .dots { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: black; font-size: 20px; }

        /* Nút Hành Động - Giống ảnh (Có icon) */
        #action-btn { 
            position: absolute; bottom: 40px; right: 40px; width: 90px; height: 90px;
            background: rgba(255,255,255,0.2); border: 5px solid #fff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        #action-btn img { width: 50px; opacity: 0.9; }
    </style>
</head>
<body>

<div id="ui">
    <div id="day-tag">DAY 0</div>
    <div class="stats">
        <div class="bar"><span class="bar-icon">❤</span><div id="hp-bar"></div></div>
        <div class="bar"><span class="bar-icon">🍖</span><div id="food-bar"></div></div>
    </div>
    
    <div id="joy-bg"><div id="joy-stick"></div></div>

    <div class="hotbar">
        <div class="slot active" onclick="sel(0)"></div>
        <div class="slot" onclick="sel(1)"></div>
        <div class="slot" onclick="sel(2)"></div>
        <div class="slot" onclick="sel(3)"></div>
        <div class="slot" onclick="sel(4)"></div>
        <div class="slot" onclick="sel(5)"></div>
        <div class="slot" onclick="sel(6)"></div>
        <div class="slot" onclick="sel(7)"></div>
        <div class="dots" onclick="alert('Mở rương')">...</div>
    </div>

    <div id="action-btn" onclick="doAction()">
        <img src="https://cdn-icons-png.flaticon.com/512/1004/1004696.png" alt="Punch">
    </div>
</div>

<canvas id="game"></canvas>

<script>
    const cvs = document.getElementById('game');
    const ctx = cvs.getContext('2d');
    cvs.width = window.innerWidth;
    cvs.height = window.innerHeight;

    // --- Biến Hệ Thống ---
    let player = { 
        x: 0, y: 0, // Vị trí trong thế giới (World)
        angle: 0, // Hướng xoay
        speed: 4,
        size: 22
    };
    let joy = { x: 0, y: 0, active: false };
    let camera = { x: 0, y: 0 };

    // --- Joystick Cảm ứng & Chuột ---
    const jBg = document.getElementById('joy-bg');
    const jSt = document.getElementById('joy-stick');

    function handleInput(clientX, clientY) {
        if(!joy.active) return;
        const r = jBg.getBoundingClientRect();
        const cx = r.left + 55, cy = r.top + 55;
        let dx = clientX - cx, dy = clientY - cy;
        const d = Math.min(Math.sqrt(dx*dx + dy*dy), 55);
        const ang = Math.atan2(dy, dx);
        
        jSt.style.transform = `translate(${Math.cos(ang)*d}px, ${Math.sin(ang)*d}px)`;
        joy.x = Math.cos(ang) * (d/55);
        joy.y = Math.sin(ang) * (d/55);
        player.angle = ang; // Cập nhật hướng xoay nhân vật
    }

    jBg.addEventListener('mousedown', () => joy.active = true);
    jBg.addEventListener('touchstart', (e) => { joy.active = true; handleInput(e.touches[0].clientX, e.touches[0].clientY); });
    window.addEventListener('mousemove', e => handleInput(e.clientX, e.clientY));
    window.addEventListener('touchmove', e => { if(joy.active) { e.preventDefault(); handleInput(e.touches[0].clientX, e.touches[0].clientY); } }, {passive: false});
    window.addEventListener('mouseup', () => { joy.active = false; jSt.style.transform = ''; joy.x = 0; joy.y = 0; });
    window.addEventListener('touchend', () => { joy.active = false; jSt.style.transform = ''; joy.x = 0; joy.y = 0; });

    // --- Vòng lặp chính ---
    function loop() {
        // 1. Update Vị trí & Camera
        player.x += joy.x * player.speed;
        player.y += joy.y * player.speed;
        camera.x = player.x - cvs.width/2;
        camera.y = player.y - cvs.height/2;

        // 2. Vẽ Nền (Map rộng lớn)
        ctx.fillStyle = "#2d5a27"; // Màu cỏ
        ctx.fillRect(0, 0, cvs.width, cvs.height);
        
        // Vẽ lưới ô vuông để thấy map đang di chuyển
        ctx.strokeStyle = "rgba(0,0,0,0.1)";
        ctx.lineWidth = 1;
        for(let i = -camera.x % 100; i < cvs.width; i += 100) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, cvs.height); ctx.stroke();
        }
        for(let i = -camera.y % 100; i < cvs.height; i += 100) {
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(cvs.width, i); ctx.stroke();
        }

        // 3. Vẽ Lửa trại (Cố định ở tọa độ 0,0 của thế giới)
        let campScreenX = 0 - camera.x;
        let campScreenY = 0 - camera.y;
        ctx.fillStyle = "rgba(255, 255, 0, 0.2)"; // Quầng sáng
        ctx.beginPath(); ctx.arc(campScreenX, campScreenY, 150, 0, 7); ctx.fill();
        ctx.fillStyle = "orange"; // Đống lửa
        ctx.beginPath(); ctx.arc(campScreenX, campScreenY, 25, 0, 7); ctx.fill();

        // 4. Vẽ Nhân vật (Ở giữa màn hình vì camera đi theo)
        let px = player.x - camera.x;
        let py = player.y - camera.y;

        ctx.save();
        ctx.translate(px, py);
        ctx.rotate(player.angle); // Xoay theo hướng di chuyển

        // Thân nhân vật (Màu vàng như ảnh Duy gửi)
        ctx.fillStyle = "#f1c40f";
        ctx.beginPath(); ctx.arc(0, 0, player.size, 0, 7); ctx.fill();
        ctx.strokeStyle = "black"; ctx.lineWidth = 2; ctx.stroke();

        // 2 cái tay (Hướng nhân vật)
        ctx.fillStyle = "#f1c40f";
        ctx.beginPath(); ctx.arc(18, -12, 8, 0, 7); ctx.fill(); // Tay trái
        ctx.stroke();
        ctx.beginPath(); ctx.arc(18, 12, 8, 0, 7); ctx.fill();  // Tay phải
        ctx.stroke();

        ctx.restore();

        requestAnimationFrame(loop);
    }

    function sel(i) {
        document.querySelectorAll('.slot').forEach((s, idx) => s.classList.toggle('active', i === idx));
    }

    loop();
    window.onresize = () => { cvs.width = window.innerWidth; cvs.height = window.innerHeight; };
</script>
</body>
</html>
