<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Survival Island</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1a472a; touch-action: none; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui { position: absolute; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        #ui * { pointer-events: auto; }
        
        /* Stats */
        .stats { position: absolute; top: 15px; left: 15px; }
        .bar { width: 120px; height: 12px; background: #222; border: 2px solid #fff; border-radius: 6px; margin-bottom: 4px; overflow: hidden; }
        #hp { width: 100%; height: 100%; background: #ff4d4d; }
        #food { width: 80%; height: 100%; background: #ffa500; }

        /* Joystick */
        #joy-bg { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.2); border: 2px solid #fff; border-radius: 50%; }
        #joy-stick { position: absolute; top: 25px; left: 25px; width: 50px; height: 50px; background: #fff; border-radius: 50%; transition: transform 0.1s; }

        /* Hotbar 8 ô */
        .hotbar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; background: rgba(0,0,0,0.6); padding: 5px; border-radius: 8px; }
        .slot { width: 38px; height: 38px; background: #444; border: 2px solid #888; border-radius: 5px; }
        .slot.active { border-color: #f1c40f; box-shadow: 0 0 8px #f1c40f; }
        .dots { width: 38px; height: 38px; background: #333; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 5px; border: 2px solid #fff; }

        /* Action */
        .action { position: absolute; bottom: 45px; right: 45px; width: 85px; height: 85px; background: rgba(255,255,255,0.1); border: 4px solid #fff; border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; text-align: center; }
    </style>
</head>
<body>

<div id="ui">
    <div class="stats">
        <div class="bar"><div id="hp"></div></div>
        <div class="bar"><div id="food"></div></div>
    </div>
    <div id="joy-bg"><div id="joy-stick"></div></div>
    <div class="hotbar" id="hotbar">
        <div class="slot active" onclick="sel(0)"></div>
        <div class="slot" onclick="sel(1)"></div>
        <div class="slot" onclick="sel(2)"></div>
        <div class="slot" onclick="sel(3)"></div>
        <div class="slot" onclick="sel(4)"></div>
        <div class="slot" onclick="sel(5)"></div>
        <div class="slot" onclick="sel(6)"></div>
        <div class="dots" onclick="alert('Mở túi đồ bự')">...</div>
    </div>
    <div class="action" onclick="alert('Hành động!')">HÀNH<br>ĐỘNG</div>
</div>

<canvas id="g"></canvas>

<script>
    const canvas = document.getElementById('g');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let p = { x: canvas.width/2, y: canvas.height/2, v: 3.5 };
    let j = { x: 0, y: 0, active: false };

    const bg = document.getElementById('joy-bg');
    const st = document.getElementById('joy-stick');

    function moveJoy(e) {
        if(!j.active) return;
        const t = e.touches ? e.touches[0] : e;
        const r = bg.getBoundingClientRect();
        const dx = t.clientX - (r.left + 50);
        const dy = t.clientY - (r.top + 50);
        const d = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
        const ang = Math.atan2(dy, dx);
        const lx = Math.cos(ang) * d;
        const ly = Math.sin(ang) * d;
        st.style.transform = `translate(${lx}px, ${ly}px)`;
        j.x = lx / 50; j.y = ly / 50;
    }

    bg.addEventListener('touchstart', (e) => { j.active = true; moveJoy(e); });
    window.addEventListener('touchmove', (e) => { if(j.active) { e.preventDefault(); moveJoy(e); } }, {passive: false});
    window.addEventListener('touchend', () => { j.active = false; st.style.transform = ''; j.x = 0; j.y = 0; });

    function sel(idx) {
        document.querySelectorAll('.slot').forEach((s, i) => s.classList.toggle('active', i === idx));
    }

    function loop() {
        ctx.fillStyle = '#1a472a'; // Nền đảo mướt rượt
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Vẽ Lửa trại trung tâm
        ctx.fillStyle = '#e67e22';
        ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, 22, 0, 7); ctx.fill();
        ctx.fillStyle = '#f1c40f';
        ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, 10, 0, 7); ctx.fill();

        // Di chuyển và vẽ nhân vật
        p.x += j.x * p.v; p.y += j.y * p.v;
        p.x = Math.max(15, Math.min(canvas.width - 15, p.x));
        p.y = Math.max(15, Math.min(canvas.height - 15, p.y));

        ctx.fillStyle = 'white';
        ctx.beginPath(); ctx.arc(p.x, p.y, 15, 0, 7); ctx.fill();

        requestAnimationFrame(loop);
    }
    loop();

    window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
</script>
</body>
</html>
