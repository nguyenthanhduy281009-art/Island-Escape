<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1a472a; }
        canvas { display: block; background: #2d5a27; }
        /* UI Layer */
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #ui * { pointer-events: auto; }
        /* Joystick */
        #joy-bg { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.2); border: 2px solid #fff; border-radius: 50%; }
        #joy-stick { position: absolute; top: 25px; left: 25px; width: 50px; height: 50px; background: #fff; border-radius: 50%; }
        /* Hotbar */
        .hotbar { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 8px; }
        .slot { width: 35px; height: 35px; background: #444; border: 2px solid #888; border-radius: 4px; }
        .active { border-color: #f1c40f; }
    </style>
</head>
<body>

<div id="ui">
    <div id="joy-bg"><div id="joy-stick"></div></div>
    <div class="hotbar">
        <div class="slot active"></div><div class="slot"></div><div class="slot"></div>
        <div class="slot"></div><div class="slot"></div><div class="slot"></div>
        <div style="color:white; font-weight:bold; padding: 5px;">...</div>
    </div>
</div>

<canvas id="g"></canvas>

<script>
    const canvas = document.getElementById('g');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let p = { x: canvas.width/2, y: canvas.height/2, v: 3 };
    let j = { x: 0, y: 0, active: false };

    // Joystick Event
    const bg = document.getElementById('joy-bg');
    const st = document.getElementById('joy-stick');

    function handleInput(e) {
        if(!j.active) return;
        const t = e.touches ? e.touches[0] : e;
        const r = bg.getBoundingClientRect();
        const dx = t.clientX - (r.left + 50);
        const dy = t.clientY - (r.top + 50);
        const d = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
        const ang = Math.atan2(dy, dx);
        
        const lx = Math.cos(ang) * d;
        const ly = Math.sin(ang) * d;
        
        st.style.transform = `translate(${lx}px, ${ly}px)`;
        j.x = lx / 50; j.y = ly / 50;
    }

    bg.addEventListener('touchstart', (e) => { j.active = true; handleInput(e); });
    window.addEventListener('touchmove', (e) => { if(j.active) { e.preventDefault(); handleInput(e); } }, {passive: false});
    window.addEventListener('touchend', () => { j.active = false; st.style.transform = ''; j.x = 0; j.y = 0; });

    // Game Loop
    function draw() {
        ctx.fillStyle = '#1a472a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Lửa trại
        ctx.fillStyle = 'orange';
        ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, 20, 0, 7); ctx.fill();

        // Nhân vật di chuyển
        p.x += j.x * p.v; p.y += j.y * p.v;
        ctx.fillStyle = 'white';
        ctx.beginPath(); ctx.arc(p.x, p.y, 15, 0, 7); ctx.fill();

        requestAnimationFrame(draw);
    }
    draw();

    window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
</script>
</body>
</html>
